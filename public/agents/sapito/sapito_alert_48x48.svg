      .exclam{animation:exclamPulse 1.4s ease-in-out infinite}
      .brow-l{animation:browFurrow 1.4s ease-in-out infinite;transform-origin:228px 308px}
      .brow-r{animation:browFurrow 1.4s ease-in-out infinite;transform-origin:452px 308px}
