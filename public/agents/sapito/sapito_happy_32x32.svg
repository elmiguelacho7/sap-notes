    <style>
      @keyframes bounce{0%,100%{transform:translateY(0) scale(1)}40%{transform:translateY(-12px) scale(1.06)}60%{transform:translateY(-6px) scale(1.03)}}
      @keyframes sparkle{0%,100%{opacity:0;transform:scale(.4) rotate(0deg)}50%{opacity:1;transform:scale(1) rotate(180deg)}}
      @keyframes checkPop{0%{opacity:0;transform:scale(0)}60%{transform:scale(1.2)}100%{opacity:1;transform:scale(1)}}
      @keyframes blushPulse{0%,100%{opacity:.18}50%{opacity:.32}}
      @keyframes squint{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.85)}}
      .body-bounce{animation:bounce 1.8s ease-in-out infinite;transform-origin:340px 500px}
      .sp1{animation:sparkle 1.6s ease-in-out infinite 0s;transform-origin:center}
      .sp2{animation:sparkle 1.6s ease-in-out infinite .3s;transform-origin:center}
      .sp3{animation:sparkle 1.6s ease-in-out infinite .6s;transform-origin:center}
      .sp4{animation:sparkle 1.6s ease-in-out infinite .9s;transform-origin:center}
      .sp5{animation:sparkle 1.6s ease-in-out infinite 1.2s;transform-origin:center}
      .check{animation:checkPop .5s ease-out forwards}
      .blush{animation:blushPulse 2s ease-in-out infinite}
      .eyeL-sq{animation:squint 1.8s ease-in-out infinite;transform-origin:228px 260px}
      .eyeR-sq{animation:squint 1.8s ease-in-out infinite;transform-origin:452px 260px}
    </style>
