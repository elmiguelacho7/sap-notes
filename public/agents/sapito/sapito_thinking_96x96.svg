    <style>
      @keyframes pulse1{0%,100%{opacity:.3;transform:scale(.8)}33%{opacity:1;transform:scale(1.15)}}
      @keyframes pulse2{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.15)}}
      @keyframes pulse3{0%,100%{opacity:.3;transform:scale(.8)}66%{opacity:1;transform:scale(1.15)}}
      @keyframes floatBubble{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
      @keyframes eyeShift{0%,40%,100%{transform:translateX(0)}50%,90%{transform:translateX(6px) translateY(-4px)}}
      @keyframes brainGlow{0%,100%{opacity:.4}50%{opacity:.9}}
      .dot1{animation:pulse1 1.4s ease-in-out infinite;transform-origin:center}
      .dot2{animation:pulse2 1.4s ease-in-out infinite;transform-origin:center}
      .dot3{animation:pulse3 1.4s ease-in-out infinite;transform-origin:center}
      .bubble{animation:floatBubble 2.8s ease-in-out infinite}
      .eyeL{animation:eyeShift 4s ease-in-out infinite;transform-origin:228px 251px}
      .eyeR{animation:eyeShift 4s ease-in-out infinite;transform-origin:452px 251px}
      .brainring{animation:brainGlow 1.8s ease-in-out infinite}
    </style>
