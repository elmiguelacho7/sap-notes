    <style>
      @keyframes blink{0%,88%,91%,100%{transform:scaleY(1)}89%,90%{transform:scaleY(0.06)}}
      @keyframes eyeGlow{0%,100%{opacity:.35}50%{opacity:.85}}
      @keyframes neonPulse{0%,100%{opacity:.55}50%{opacity:.9}}
      @keyframes breathe{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.008)}}
      .eyelid-l{transform-origin:228px 251px;animation:blink 5.2s ease-in-out infinite}
      .eyelid-r{transform-origin:452px 251px;animation:blink 5.2s ease-in-out infinite}
      .eye-glow-l{animation:eyeGlow 3.8s ease-in-out infinite}
      .eye-glow-r{animation:eyeGlow 3.8s ease-in-out infinite .4s}
      .neon-ring-l{animation:neonPulse 4s ease-in-out infinite}
      .neon-ring-r{animation:neonPulse 4s ease-in-out infinite .5s}
      .ai-node-center{animation:neonPulse 3.5s ease-in-out infinite}
      .body{transform-origin:340px 450px;animation:breathe 5s ease-in-out infinite}
    </style>
