    <style>
      @keyframes breathe{0%,100%{transform:scaleY(1) scaleX(1)}50%{transform:scaleY(1.025) scaleX(1.012)}}
      @keyframes floatZ1{0%{opacity:0;transform:translate(0,0) scale(.5)}30%{opacity:1}100%{opacity:0;transform:translate(30px,-70px) scale(1.1)}}
      @keyframes floatZ2{0%{opacity:0;transform:translate(0,0) scale(.5)}30%{opacity:1}100%{opacity:0;transform:translate(50px,-100px) scale(1.3)}}
      @keyframes floatZ3{0%{opacity:0;transform:translate(0,0) scale(.5)}30%{opacity:1}100%{opacity:0;transform:translate(70px,-130px) scale(1.5)}}
      @keyframes moonFloat{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-8px) rotate(-4deg)}}
      @keyframes starTwinkle{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
      @keyframes eyelidBlink{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}
      .body-breathe{animation:breathe 4s ease-in-out infinite;transform-origin:340px 430px}
      .z1{animation:floatZ1 3s ease-out infinite 0s}
      .z2{animation:floatZ2 3s ease-out infinite .8s}
      .z3{animation:floatZ3 3s ease-out infinite 1.6s}
      .moon{animation:moonFloat 4s ease-in-out infinite;transform-origin:560px 120px}
      .star1{animation:starTwinkle 2s ease-in-out infinite 0s;transform-origin:108px 152px}
      .star2{animation:starTwinkle 2s ease-in-out infinite .6s;transform-origin:594px 220px}
      .star3{animation:starTwinkle 2s ease-in-out infinite 1.2s;transform-origin:340px 72px}
      .eyelid{animation:eyelidBlink 6s ease-in-out infinite}
    </style>
