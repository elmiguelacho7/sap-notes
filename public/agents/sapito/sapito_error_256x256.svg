    <style>
      @keyframes wobble{0%,100%{transform:rotate(0deg)}20%{transform:rotate(-6deg)}40%{transform:rotate(5deg)}60%{transform:rotate(-4deg)}80%{transform:rotate(3deg)}}
      @keyframes eyeCross{0%,100%{transform:rotate(0deg) scale(1)}50%{transform:rotate(5deg) scale(1.04)}}
      @keyframes errPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
      @keyframes floatQ1{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-8px) rotate(8deg)}}
      @keyframes floatQ2{0%,100%{transform:translateY(0) rotate(6deg)}50%{transform:translateY(-6px) rotate(-6deg)}}
      @keyframes swirl{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-40}}
      .body-wobble{animation:wobble 2.2s ease-in-out infinite;transform-origin:340px 420px}
      .eyeL-x{animation:eyeCross 1.8s ease-in-out infinite;transform-origin:228px 255px}
      .eyeR-x{animation:eyeCross 1.8s ease-in-out infinite .2s;transform-origin:452px 255px}
      .err-badge{animation:errPulse 1.2s ease-in-out infinite;transform-origin:536px 140px}
      .q1{animation:floatQ1 2s ease-in-out infinite}
      .q2{animation:floatQ2 2.4s ease-in-out infinite .4s}
      .q3{animation:floatQ1 1.8s ease-in-out infinite .8s}
      .swirl-line{animation:swirl 1.2s linear infinite;stroke-dasharray:8 4}
    </style>
